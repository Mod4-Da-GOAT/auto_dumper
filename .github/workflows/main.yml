name: Dump Firmware CI

on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct URL of ROM/Firmware"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  DUMPYARA_PAT: ${{ secrets.DUMPYARA_PAT }}

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Clone Dumpyara
        run: |
          cd /tmp
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          chmod +x dumpyara.sh
          if [ -f setup.sh ]; then sudo bash setup.sh; fi
          echo -n "$DUMPYARA_PAT" > /tmp/dumpyara/.github_token
          chmod 600 /tmp/dumpyara/.github_token
          echo "$GIT_ORG" > /tmp/dumpyara/.github_orgname
          echo "$TG_TOKEN" > /tmp/dumpyara/.tg_token
          echo "$CHAT_ID" > /tmp/dumpyara/.tg_chat

      - name: Install extraction & partition tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y p7zip-full lz4 android-sdk-libsparse-utils aria2 curl python3-pip
          pip3 install --no-cache-dir liblp

          # Safe 7z wrapper: skip .img files, only handle archives
          if [ -x /usr/bin/7z ]; then sudo mv /usr/bin/7z /usr/bin/7z.real || true; fi
          sudo tee /usr/local/bin/7z >/dev/null <<'BASH'
#!/usr/bin/env bash
REAL7Z="/usr/bin/7z.real"
if [ ! -x "$REAL7Z" ]; then echo "ERROR: 7z not found"; exit 1; fi
args=()
for arg in "$@"; do
  if [[ "$arg" =~ \.img$ ]]; then continue; fi
  args+=("$arg")
done
exec "$REAL7Z" "${args[@]}"
BASH
          sudo chmod +x /usr/local/bin/7z
          echo "[setup] 7z wrapper installed."

      - name: Download ROM and pre-extract images
        run: |
          mkdir -p "$RUNNER_TEMP/roms"
          cd "$RUNNER_TEMP/roms"
          SHORT_FILE="firmware.zip"
          echo "Downloading ROM from: ${ROM_LINK}"
          if ! aria2c -x16 -s16 -m5 -k1M -o "$SHORT_FILE" "${ROM_LINK}"; then
            curl -L --retry 5 --retry-all-errors -C - -o "$SHORT_FILE" "${ROM_LINK}"
          fi
          if [ ! -f "$SHORT_FILE" ] || [ ! -s "$SHORT_FILE" ]; then
            echo "ERROR: download failed or empty file"; exit 1
          fi

          mkdir -p extracted
          if unzip -t "$SHORT_FILE" >/dev/null 2>&1; then
            unzip -q "$SHORT_FILE" -d extracted || true
          elif tar -tf "$SHORT_FILE" >/dev/null 2>&1; then
            tar -xf "$SHORT_FILE" -C extracted || true
          else
            cp "$SHORT_FILE" extracted/
          fi

          cd extracted || exit 0

          # Decompress super.img.lz4
          for s in *super*.img.lz4 2>/dev/null; do
            echo "Decompressing $s -> super.img.raw"
            lz4 -d "$s" "super.img.raw" || true
          done

          # Convert sparse .img files
          for img in *.img 2>/dev/null; do
            if file "$img" | grep -qi "Android sparse image"; then
              simg2img "$img" "${img}.raw" && mv "${img}.raw" "$img" || true
            fi
          done

          # Pre-extract dynamic super.img partitions
          if [ -f super.img.raw ]; then
            mkdir -p super_unpacked
            lpunpack super.img.raw super_unpacked || true
            mv super_unpacked/*.img ./ 2>/dev/null || true
          fi

          echo "Files ready for Dumpyara:"
          ls -lah .

      - name: Run Dumpyara
        run: |
          mkdir -p /tmp/df
          cd /tmp/dumpyara
          ./dumpyara.sh "$RUNNER_TEMP/roms/firmware.zip" --working-dir /tmp/df || true

      - name: Rename output folder based on original filename
        run: |
          cd /tmp/df
          ORIG_NAME=$(basename "${ROM_LINK}" | cut -d'?' -f1)
          if [ -d output ]; then mv output "${ORIG_NAME%.zip}" || true; fi

      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/df/*

      - name: Cleanup
        run: |
          sudo rm -rf /tmp/dumpyara $RUNNER_TEMP/roms /tmp/df ~/.cache || true

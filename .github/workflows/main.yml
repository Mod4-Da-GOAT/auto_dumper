name: Dump Firmware CI

on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct URL of ROM/Firmware"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  DUMPYARA_PAT: ${{ secrets.DUMPYARA_PAT }}

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      # Free up space
      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      # Clone dumpyara repo
      - name: Clone Dumpyara
        run: |
          cd /tmp
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          chmod +x dumpyara.sh
          if [ -f setup.sh ]; then
            sudo bash setup.sh
          fi
          # Provide tokens and info
          echo -n "$DUMPYARA_PAT" > /tmp/dumpyara/.github_token
          chmod 600 /tmp/dumpyara/.github_token
          echo "$GIT_ORG" > /tmp/dumpyara/.github_orgname
          echo "$TG_TOKEN" > /tmp/dumpyara/.tg_token
          echo "$CHAT_ID" > /tmp/dumpyara/.tg_chat

      # Fast multi-threaded firmware download
      - name: Download ROM (Fast)
        run: |
          sudo apt-get update -y && sudo apt-get install -y aria2
          mkdir -p /tmp/roms
          ROM_FILE="/tmp/roms/firmware.zip"
          echo "Downloading ROM from ${ROM_LINK} using aria2c..."
          aria2c -x16 -s16 -m5 -k1M -o "$ROM_FILE" "${ROM_LINK}"
          echo "Download complete: $ROM_FILE"
          ls -lh "$ROM_FILE"

      # Run Dumpyara on the downloaded file
      - name: Dump Firmware
        run: |
          cd /tmp/dumpyara
          ./dumpyara.sh "/tmp/roms/firmware.zip" || exit 1

      # Upload results as artifact
      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/df/output

      # Cleanup temporary files
      - name: Cleanup
        run: |
          sudo rm -rf /tmp/dumpyara /tmp/roms /tmp/df ~/.cache || true

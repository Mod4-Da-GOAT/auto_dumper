name: Dump Firmware CI

on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct URL of ROM/Firmware"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  DUMPYARA_PAT: ${{ secrets.DUMPYARA_PAT }}

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      # Free up disk space
      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      # Clone Dumpyara repo
      - name: Clone Dumpyara
        run: |
          cd /tmp
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          chmod +x dumpyara.sh
          if [ -f setup.sh ]; then
            sudo bash setup.sh
          fi
          echo -n "$DUMPYARA_PAT" > /tmp/dumpyara/.github_token
          chmod 600 /tmp/dumpyara/.github_token
          echo "$GIT_ORG" > /tmp/dumpyara/.github_orgname
          echo "$TG_TOKEN" > /tmp/dumpyara/.tg_token
          echo "$CHAT_ID" > /tmp/dumpyara/.tg_chat

      # Install extraction tools
      - name: Install Extraction Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full lz4 android-sdk-libsparse-utils aria2 curl

      # Download ROM with fail-fast checks
      - name: Download ROM (Fast & Safe Name)
        run: |
          mkdir -p $RUNNER_TEMP/roms
          cd $RUNNER_TEMP/roms
          SHORT_FILE="firmware.zip"

          echo "🔽 Downloading ROM from ${ROM_LINK} using aria2c..."
          if ! aria2c -x16 -s16 -m5 -k1M -o "$SHORT_FILE" "${ROM_LINK}"; then
            echo "⚠️ aria2c failed, falling back to curl..."
            curl -L --retry 5 --retry-all-errors -C - -o "$SHORT_FILE" "${ROM_LINK}"
          fi

          echo "Checking if file downloaded successfully..."
          if [ ! -f "$SHORT_FILE" ]; then
            echo "❌ ERROR: No file downloaded."
            exit 1
          fi

          if [ ! -s "$SHORT_FILE" ]; then
            echo "❌ ERROR: Downloaded file is empty (0 bytes)."
            exit 1
          fi

          echo "✅ Download complete: $PWD/$SHORT_FILE"
          ls -lh "$SHORT_FILE"

      # Run Dumpyara
      - name: Dump Firmware
        run: |
          mkdir -p /tmp/df
          cd /tmp/dumpyara
          ./dumpyara.sh "$RUNNER_TEMP/roms/firmware.zip" --working-dir /tmp/df || true

      # Rename output folder based on original filename
      - name: Rename Output Folder
        run: |
          cd /tmp/df
          ORIG_NAME=$(basename "${ROM_LINK}" | cut -d'?' -f1)
          if [ -d output ]; then
            mv output "${ORIG_NAME%.zip}" || true
          fi

      # Upload output
      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/df/*

      # Cleanup
      - name: Cleanup
        run: |
          sudo rm -rf /tmp/dumpyara $RUNNER_TEMP/roms /tmp/df ~/.cache || true


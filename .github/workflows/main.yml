name: Dump Firmware CI (Printf - Full, no 7z)
on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct URL of ROM/Firmware"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  DUMPYARA_PAT: ${{ secrets.DUMPYARA_PAT }}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:

      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Create clone_dumpyara.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'cd /tmp' \
          'if [ -d /tmp/dumpyara ]; then rm -rf /tmp/dumpyara || true; fi' \
          'git clone https://github.com/AndroidDumps/dumpyara.git' \
          'cd dumpyara' \
          'chmod +x dumpyara.sh || true' \
          'if [ -f setup.sh ]; then sudo bash setup.sh; fi' \
          'mkdir -p /tmp/dumpyara' \
          'echo -n "$DUMPYARA_PAT" > /tmp/dumpyara/.github_token' \
          'chmod 600 /tmp/dumpyara/.github_token || true' \
          'echo "$GIT_ORG" > /tmp/dumpyara/.github_orgname' \
          'echo "$TG_TOKEN" > /tmp/dumpyara/.tg_token' \
          'echo "$CHAT_ID" > /tmp/dumpyara/.tg_chat' \
          > /tmp/clone_dumpyara.sh
          chmod +x /tmp/clone_dumpyara.sh
          /tmp/clone_dumpyara.sh

      - name: Create install_tools.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'sudo apt-get update -y' \
          'sudo apt-get install -y p7zip-full lz4 android-sdk-libsparse-utils aria2 curl python3-pip unzip' \
          '# Ensure simg2img and lpunpack (android sparse tools) are available via android-sdk-libsparse-utils' \
          'pip3 install --no-cache-dir liblp' \
          > /tmp/install_tools.sh
          chmod +x /tmp/install_tools.sh
          /tmp/install_tools.sh

      - name: Create fetch.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'URL="$1"' \
          'OUT="$2"' \
          'echo "[fetch] Input URL: $URL"' \
          'REAL_URL=$(curl -L -s -o /dev/null -w "%{url_effective}" "$URL" || echo "$URL")' \
          'echo "[fetch] Final resolved URL: $REAL_URL"' \
          'echo "[fetch] Downloading to: $OUT"' \
          '' \
          'aria2c -x16 -s16 -j1 -m10 -k1M --console-log-level=warn --file-allocation=none -o "$OUT" "$REAL_URL" && exit 0' \
          '' \
          'echo "[fetch] aria2c failed - switching to curl fallback."' \
          '' \
          'curl -L --retry 10 --retry-delay 5 --retry-all-errors --speed-time 15 --speed-limit 10000 -C - -o "$OUT" "$REAL_URL"' \
          '' \
          'echo "[fetch] Download complete."' \
          > /tmp/fetch.sh
          chmod +x /tmp/fetch.sh

      - name: Create download_only.sh (printf)
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'RUNNER_TEMP_DIR="${RUNNER_TEMP:-/tmp}"' \
          'mkdir -p "$RUNNER_TEMP_DIR/roms"' \
          'cd "$RUNNER_TEMP_DIR/roms"' \
          'SHORT_FILE="firmware.zip"' \
          '' \
          'echo "Downloading ROM from: $ROM_LINK"' \
          '/tmp/fetch.sh "$ROM_LINK" "$SHORT_FILE"' \
          '' \
          'if [ ! -s "$SHORT_FILE" ]; then' \
          '  echo "Download failed"; exit 1' \
          'fi' \
          '' \
          'echo "[download] Saved as: $RUNNER_TEMP_DIR/roms/$SHORT_FILE"' \
          'ls -lh "$SHORT_FILE"' \
          > /tmp/download_only.sh
          chmod +x /tmp/download_only.sh
          /tmp/download_only.sh

      - name: Create run_dumpyara.sh (printf)
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'echo "[dumpyara] Preparing to run Dumpyara on original ZIP"' \
          'mkdir -p /tmp/df' \
          'cd /tmp/dumpyara' \
          'echo "[dumpyara] Tools available:"' \
          'command -v simg2img || echo "simg2img not found"' \
          'command -v lpunpack || echo "lpunpack not found"' \
          'echo "[dumpyara] Executing: ./dumpyara.sh \"$RUNNER_TEMP/roms/firmware.zip\" --working-dir /tmp/df"' \
          './dumpyara.sh "$RUNNER_TEMP/roms/firmware.zip" --working-dir /tmp/df || true' \
          > /tmp/run_dumpyara.sh
          chmod +x /tmp/run_dumpyara.sh
          /tmp/run_dumpyara.sh

      - name: Create rename_output.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'cd /tmp/df' \
          'ORIG_NAME=$(basename "$ROM_LINK" | cut -d"?" -f1)' \
          'if [ -d output ]; then' \
          '  mv output "${ORIG_NAME%.zip}"' \
          'fi' \
          > /tmp/rename_output.sh
          chmod +x /tmp/rename_output.sh
          /tmp/rename_output.sh

      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/df/*

      - name: Create cleanup.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'sudo rm -rf /tmp/dumpyara "${RUNNER_TEMP:-/tmp}/roms" /tmp/df ~/.cache || true' \
          > /tmp/cleanup.sh
          chmod +x /tmp/cleanup.sh
          /tmp/cleanup.sh

name: Dump Firmware CI (Printf - AP support, no 7z wrapper)
on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct URL of ROM/Firmware (zip / ap / tar / payload.bin)"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  DUMPYARA_PAT: ${{ secrets.DUMPYARA_PAT }}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:

      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Create clone_dumpyara.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'cd /tmp' \
          'if [ -d /tmp/dumpyara ]; then rm -rf /tmp/dumpyara || true; fi' \
          'git clone https://github.com/AndroidDumps/dumpyara.git' \
          'cd dumpyara' \
          'chmod +x dumpyara.sh || true' \
          'if [ -f setup.sh ]; then sudo bash setup.sh; fi' \
          'mkdir -p /tmp/dumpyara' \
          'echo -n "$DUMPYARA_PAT" > /tmp/dumpyara/.github_token' \
          'chmod 600 /tmp/dumpyara/.github_token || true' \
          'echo "$GIT_ORG" > /tmp/dumpyara/.github_orgname' \
          'echo "$TG_TOKEN" > /tmp/dumpyara/.tg_token' \
          'echo "$CHAT_ID" > /tmp/dumpyara/.tg_chat' \
          > /tmp/clone_dumpyara.sh
          chmod +x /tmp/clone_dumpyara.sh
          /tmp/clone_dumpyara.sh

      - name: Create install_tools.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'sudo apt-get update -y' \
          'sudo apt-get install -y p7zip-full lz4 android-sdk-libsparse-utils aria2 curl python3-pip unzip bsdtar' \
          'pip3 install --no-cache-dir liblp' \
          > /tmp/install_tools.sh
          chmod +x /tmp/install_tools.sh
          /tmp/install_tools.sh

      - name: Create fetch.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'URL="$1"' \
          'OUT="$2"' \
          'echo "[fetch] Input URL: $URL"' \
          'REAL_URL=$(curl -L -s -o /dev/null -w "%{url_effective}" "$URL" || echo "$URL")' \
          'echo "[fetch] Final resolved URL: $REAL_URL"' \
          'echo "[fetch] Downloading to: $OUT"' \
          '' \
          'aria2c -x16 -s16 -j1 -m10 -k1M --console-log-level=warn --file-allocation=none -o "$OUT" "$REAL_URL" && exit 0' \
          '' \
          'echo "[fetch] aria2c failed - switching to curl fallback."' \
          '' \
          'curl -L --retry 10 --retry-delay 5 --retry-all-errors --speed-time 15 --speed-limit 10000 -C - -o "$OUT" "$REAL_URL"' \
          '' \
          'echo "[fetch] Download complete."' \
          > /tmp/fetch.sh
          chmod +x /tmp/fetch.sh

      - name: Create download_and_prepare.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          '' \
          '# Download file to runner temp roms dir' \
          'RUNNER_TEMP_DIR="${RUNNER_TEMP:-/tmp}"' \
          'mkdir -p "$RUNNER_TEMP_DIR/roms"' \
          'cd "$RUNNER_TEMP_DIR/roms"' \
          'OUTNAME="firmware.zip"' \
          '' \
          'echo "[dl] Downloading ROM from: $ROM_LINK"' \
          '/tmp/fetch.sh "$ROM_LINK" "$OUTNAME"' \
          '' \
          'if [ ! -s "$OUTNAME" ]; then' \
          '  echo "[dl] Download failed or empty file"; exit 1' \
          'fi' \
          '' \
          '# Detect extension and attempt to normalize to firmware.zip when possible' \
          'lower=$(echo "$OUTNAME" | tr \"[:upper:]\" \"[:lower:]\")' \
          'echo "[dl] Saved file: $RUNNER_TEMP_DIR/roms/$OUTNAME"' \
          'ls -lh "$OUTNAME"' \
          '' \
          '# If file appears to be .ap (Samsung/AP packages, or vendor .ap), try extract' \
          'if file "$OUTNAME" | grep -qi \"Zip archive\" || file "$OUTNAME" | grep -qi \"Android sparse image\" || file "$OUTNAME" | grep -qi \"XZ compressed data\" || file "$OUTNAME" | grep -qi \"bzip2\"; then' \
          '  echo "[dl] Looks like a normal archive or image ($OUTNAME) - keeping as is"' \
          'else' \
          '  echo "[dl] Checking for .ap extension or unknown container"' \
          'fi' \
          '' \
          '# Try to handle .ap specially: some vendors use .ap as an archive/container' \
          'if echo "$OUTNAME" | grep -qi \"\\.ap$\" || file "$OUTNAME" | grep -qi \"Android Package\" 1>/dev/null 2>&1; then' \
          '  echo \"[dl] Detected .ap container - attempting extraction with multiple tools\"' \
          '  mkdir -p ./ap_extract' \
          '  extracted=false' \
          '  # try 7z' \
          '  if command -v 7z >/dev/null 2>&1; then' \
          '    echo \"[dl] trying 7z x\"' \
          '    if 7z x -y "$OUTNAME" -o./ap_extract >/dev/null 2>&1; then' \
          '      extracted=true' \
          '    fi' \
          '  fi' \
          '  # try unzip' \
          '  if [ \"$extracted\" = false ]; then' \
          '    echo \"[dl] trying unzip\"' \
          '    if unzip -q "$OUTNAME" -d ./ap_extract >/dev/null 2>&1; then' \
          '      extracted=true' \
          '    fi' \
          '  fi' \
          '  # try bsdtar (tar auto-detect)' \
          '  if [ \"$extracted\" = false ] && command -v bsdtar >/dev/null 2>&1; then' \
          '    echo \"[dl] trying bsdtar -xf\"' \
          '    if bsdtar -xf "$OUTNAME" -C ./ap_extract >/dev/null 2>&1; then' \
          '      extracted=true' \
          '    fi' \
          '  fi' \
          '' \
          '  if [ \"$extracted\" = true ]; then' \
          '    echo \"[dl] extraction of .ap succeeded; listing ap_extract:\"' \
          '    ls -lah ap_extract || true' \
          '    # If super.img found, copy it beside firmware.zip for later tools' \
          '    if ls ap_extract/*super*.img* 1>/dev/null 2>&1; then' \
          '      echo \"[dl] Found super.img inside .ap. Copying to working area as super.img\"' \
          '      cp ap_extract/*super*.img* ./super.img || true' \
          '    fi' \
          '    # If payload.bin found, copy it' \
          '    if ls ap_extract/*payload* 1>/dev/null 2>&1; then' \
          '      cp ap_extract/*payload* ./payload.bin || true' \
          '    fi' \
          '  else' \
          '    echo \"[dl] .ap extraction attempts failed - will keep original file and let dumpyara attempt extraction\"' \
          '  fi' \
          'fi' \
          '' \
          'echo \"[dl] download_and_prepare finished\"' \
          'ls -lah' \
          > /tmp/download_and_prepare.sh
          chmod +x /tmp/download_and_prepare.sh
          /tmp/download_and_prepare.sh

      - name: Create prepare_dumpyara_workdir.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          '' \
          '# Create Dumpyara working directory where Dumpyara expects token files' \
          'BASE_NAME=$(basename "$ROM_LINK" | cut -d\"?\" -f1)' \
          'BASE_NAME=${BASE_NAME%.zip}' \
          'WORKING_DIR="/tmp/dumpyara/working/${BASE_NAME}"' \
          'mkdir -p "$WORKING_DIR"' \
          '' \
          '# Write expected token files into Dumpyara working directory' \
          'if [ -n "${TG_TOKEN:-}" ]; then echo -n "$TG_TOKEN" > "$WORKING_DIR/.tgtoken" || true; fi' \
          'if [ -n "${DUMPYARA_PAT:-}" ]; then echo -n "$DUMPYARA_PAT" > "$WORKING_DIR/.github_token" || true; fi' \
          'if [ -n "${GIT_ORG:-}" ]; then echo -n "$GIT_ORG" > "$WORKING_DIR/.github_orgname" || true; fi' \
          'if [ -n "${TG_TOKEN:-}" ]; then echo -n "$CHAT_ID" > "$WORKING_DIR/.tg_chat" || true; fi' \
          '' \
          'chmod 600 "$WORKING_DIR/.github_token" 2>/dev/null || true' \
          'echo "[prep] Dumpyara working directory prepared: $WORKING_DIR"' \
          'ls -lah "$WORKING_DIR" || true' \
          > /tmp/prepare_dumpyara_workdir.sh
          chmod +x /tmp/prepare_dumpyara_workdir.sh
          /tmp/prepare_dumpyara_workdir.sh

      - name: Create run_dumpyara.sh (writes tokens into working dir and runs on original ZIP)
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'echo "[dumpyara] Starting dumpyara run (will use original ZIP)"' \
          'mkdir -p /tmp/df' \
          'cd /tmp/dumpyara' \
          'BASE_NAME=$(basename "$ROM_LINK" | cut -d\"?\" -f1)' \
          'BASE_NAME=${BASE_NAME%.zip}' \
          'WORKING_DIR="/tmp/dumpyara/working/${BASE_NAME}"' \
          'echo "[dumpyara] Working dir to be used: $WORKING_DIR"' \
          'if [ ! -d "$WORKING_DIR" ]; then mkdir -p "$WORKING_DIR"; fi' \
          '' \
          '# Ensure tokens exist in working dir (redundant but safe)' \
          'if [ -n "${TG_TOKEN:-}" ]; then echo -n "$TG_TOKEN" > "$WORKING_DIR/.tgtoken" || true; fi' \
          'if [ -n "${DUMPYARA_PAT:-}" ]; then echo -n "$DUMPYARA_PAT" > "$WORKING_DIR/.github_token" || true; fi' \
          'if [ -n "${GIT_ORG:-}" ]; then echo -n "$GIT_ORG" > "$WORKING_DIR/.github_orgname" || true; fi' \
          'if [ -n "${CHAT_ID:-}" ]; then echo -n "$CHAT_ID" > "$WORKING_DIR/.tg_chat" || true; fi' \
          'chmod 600 "$WORKING_DIR/.github_token" 2>/dev/null || true' \
          '' \
          'echo "[dumpyara] Listing working dir before run:"' \
          'ls -lah "$WORKING_DIR" || true' \
          '' \
          'echo "[dumpyara] Running: ./dumpyara.sh \"$RUNNER_TEMP/roms/firmware.zip\" --working-dir /tmp/df"' \
          './dumpyara.sh "$RUNNER_TEMP/roms/firmware.zip" --working-dir /tmp/df || true' \
          '' \
          'echo "[dumpyara] done"' \
          > /tmp/run_dumpyara.sh
          chmod +x /tmp/run_dumpyara.sh
          /tmp/run_dumpyara.sh

      - name: Create rename_output.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'cd /tmp/df' \
          'ORIG_NAME=$(basename "$ROM_LINK" | cut -d\"?\" -f1)' \
          'if [ -d output ]; then' \
          '  mv output \"${ORIG_NAME%.zip}\"' \
          'fi' \
          > /tmp/rename_output.sh
          chmod +x /tmp/rename_output.sh
          /tmp/rename_output.sh

      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/df/*

      - name: Create cleanup.sh
        run: |
          printf '%s\n' \
          '#!/usr/bin/env bash' \
          'set -euo pipefail' \
          'sudo rm -rf /tmp/dumpyara \"${RUNNER_TEMP:-/tmp}/roms\" /tmp/df ~/.cache || true' \
          > /tmp/cleanup.sh
          chmod +x /tmp/cleanup.sh
          /tmp/cleanup.sh

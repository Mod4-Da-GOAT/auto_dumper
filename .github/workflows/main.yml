name: CI

on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct Link of ROM/Firmware"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      # Free up space before doing any work
      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      # Clone Dumpyara repo and setup
      - name: Clone dumpyara
        run: |
          cd /tmp
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          chmod +x dumpyara.sh
          if [ -f setup.sh ]; then
            sudo bash setup.sh
          fi
          # Write GitHub token in the expected place, no newline
          echo -n "${{ secrets.GITHUB_TOKEN }}" > /tmp/dumpyara/.github_token
          echo "$GIT_ORG" > .github_orgname
          echo "$TG_TOKEN" > .tg_token
          echo "$CHAT_ID" > .tg_chat

      # Run Dumpyara
      - name: Dump Firmware
        run: |
          cd /tmp/dumpyara
          ./dumpyara.sh "${ROM_LINK}" || exit 1

      # Upload Dump result
      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/dumpyara/output

      # Clean up to prevent leftover data
      - name: Cleanup
        run: |
          sudo rm -rf /tmp/* ~/.cache || true

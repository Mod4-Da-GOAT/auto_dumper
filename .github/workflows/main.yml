name: Dump Firmware CI (Patch dumpyara - img handler, debug listing)

on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct URL of ROM/Firmware (zip / ap / tar / payload.bin / ap)"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  DUMPYARA_PAT: ${{ secrets.DUMPYARA_PAT }}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:

      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Clone Dumpyara (HEREDOC-safe)
        run: |
          cat <<'EOF' > /tmp/clone_dumpyara.sh
          #!/usr/bin/env bash
          set -euo pipefail
          cd /tmp
          rm -rf /tmp/dumpyara || true
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          chmod +x dumpyara.sh || true
          [ -f setup.sh ] && sudo bash setup.sh || true

          mkdir -p /tmp/dumpyara
          [ -n "${DUMPYARA_PAT:-}" ] && echo -n "$DUMPYARA_PAT" > /tmp/dumpyara/.github_token
          [ -n "${GIT_ORG:-}" ]       && echo -n "$GIT_ORG"       > /tmp/dumpyara/.github_orgname
          [ -n "${TG_TOKEN:-}" ]      && echo -n "$TG_TOKEN"      > /tmp/dumpyara/.tg_token
          [ -n "${CHAT_ID:-}" ]       && echo -n "$CHAT_ID"       > /tmp/dumpyara/.tg_chat
          chmod 600 /tmp/dumpyara/.github_token 2>/dev/null || true
          echo "[clone] Dumpyara cloned to /tmp/dumpyara"
          EOF
          chmod +x /tmp/clone_dumpyara.sh
          /tmp/clone_dumpyara.sh

      - name: Install tools
        run: |
          cat <<'EOF' > /tmp/install_tools.sh
          #!/usr/bin/env bash
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y p7zip-full lz4 android-sdk-libsparse-utils aria2 curl python3-pip unzip libarchive-tools git tree
          pip3 install --no-cache-dir liblp
          EOF
          chmod +x /tmp/install_tools.sh
          /tmp/install_tools.sh

      - name: Create img handler
        run: |
          sudo tee /usr/local/bin/dumpyara_img_handler.sh >/dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          IMG="$1"
          OUTDIR="$2"
          mkdir -p "$OUTDIR"
          echo "[img-handler] IMG=$IMG OUTDIR=$OUTDIR"

          # If it's a super image, prefer lpunpack
          if echo "$IMG" | grep -qi super; then
            if command -v lpunpack >/dev/null 2>&1; then
              lpunpack "$IMG" "$OUTDIR" || echo "[img-handler] lpunpack failed"
              exit 0
            fi
          fi

          # If sparse image, convert with simg2img
          if file -b "$IMG" | grep -qi "android sparse image"; then
            TMPRAW="$OUTDIR/$(basename "$IMG").raw"
            if command -v simg2img >/dev/null 2>&1; then
              simg2img "$IMG" "$TMPRAW" || echo "[img-handler] simg2img failed"
              exit 0
            fi
          fi

          # fallback: copy the file
          cp -f "$IMG" "$OUTDIR/" || true
          exit 0
          EOF
          sudo chmod +x /usr/local/bin/dumpyara_img_handler.sh

      - name: Patch dumpyara.sh (prepend safe header, no nested quotes)
        run: |
          cat <<'EOF' > /tmp/patch_dumpyara.sh
          #!/usr/bin/env bash
          set -euo pipefail
          S=/tmp/dumpyara/dumpyara.sh
          if [ ! -f "$S" ]; then
            echo "[patch] dumpyara.sh not found at $S"; exit 1
          fi
          cp -f "$S" "$S.bak"

          # Create a small header that defines dumpyara_7z() which calls the img handler for .img files
          cat > /tmp/dumpyara_header.sh <<'HEADER'
          # patched helper: dumpyara_7z()
          dumpyara_7z() {
            args=( "$@" )
            for a in "${args[@]}"; do
              case "$a" in
                -*) continue ;;
                *)
                  if echo "$a" | grep -qi '\.img' || echo "$a" | grep -qi super; then
                    outdir="$(pwd)/.dumpyara_img_extracted"
                    mkdir -p "$outdir"
                    /usr/local/bin/dumpyara_img_handler.sh "$a" "$outdir" || true
                  fi
                ;;
              esac
            done
            if command -v 7z >/dev/null 2>&1; then
              7z "${args[@]}" || true
            fi
          }
          HEADER

          # Prepend the header to the original script
          cat /tmp/dumpyara_header.sh "$S.bak" > "$S"
          chmod +x "$S"
          echo "[patch] dumpyara.sh patched (header prepended)"
          EOF
          chmod +x /tmp/patch_dumpyara.sh
          /tmp/patch_dumpyara.sh

      - name: Create fetch helper
        run: |
          cat <<'EOF' > /tmp/fetch.sh
          #!/usr/bin/env bash
          set -euo pipefail
          URL="$1"
          OUT="$2"
          REAL_URL=$(curl -L -s -o /dev/null -w "%{url_effective}" "$URL" || echo "$URL")
          aria2c -x16 -s16 -j1 -m10 -k1M --console-log-level=warn --file-allocation=none -o "$OUT" "$REAL_URL" && exit 0
          curl -L --retry 10 --retry-delay 5 --retry-all-errors --speed-time 15 --speed-limit 10000 -C - -o "$OUT" "$REAL_URL"
          EOF
          chmod +x /tmp/fetch.sh

      - name: Download firmware (no pre-extraction)
        run: |
          cat <<'EOF' > /tmp/download_firmware.sh
          #!/usr/bin/env bash
          set -euo pipefail
          RT="${RUNNER_TEMP:-/tmp}"
          mkdir -p "$RT/roms"
          cd "$RT/roms"
          OUT=firmware.zip
          /tmp/fetch.sh "$ROM_LINK" "$OUT"
          if [ ! -s "$OUT" ]; then
            echo "[dl] download failed or empty file"; exit 1
          fi
          echo "[dl] saved: $RT/roms/$OUT"
          ls -lh "$OUT"
          EOF
          chmod +x /tmp/download_firmware.sh
          /tmp/download_firmware.sh

      - name: Prepare Dumpyara working dir (tokens)
        run: |
          cat <<'EOF' > /tmp/prepare_workdir.sh
          #!/usr/bin/env bash
          set -euo pipefail
          BASE=$(basename "$ROM_LINK" | cut -d"?" -f1)
          BASE=${BASE%.zip}
          WK="/tmp/dumpyara/working/$BASE"
          mkdir -p "$WK"
          [ -n "${TG_TOKEN:-}" ] && echo -n "$TG_TOKEN" > "$WK/.tgtoken"
          [ -n "${DUMPYARA_PAT:-}" ] && echo -n "$DUMPYARA_PAT" > "$WK/.github_token"
          [ -n "${GIT_ORG:-}" ] && echo -n "$GIT_ORG" > "$WK/.github_orgname"
          [ -n "${CHAT_ID:-}" ] && echo -n "$CHAT_ID" > "$WK/.tg_chat"
          chmod 600 "$WK/.github_token" 2>/dev/null || true
          echo "[prep] Dumpyara working dir: $WK"
          ls -lah "$WK" || true
          EOF
          chmod +x /tmp/prepare_workdir.sh
          /tmp/prepare_workdir.sh

      - name: Run patched Dumpyara on original ZIP
        run: |
          cat <<'EOF' > /tmp/run_dumpyara_patched.sh
          #!/usr/bin/env bash
          set -euo pipefail
          RT="${RUNNER_TEMP:-/tmp}"
          ZIP="$RT/roms/firmware.zip"
          mkdir -p /tmp/df
          cd /tmp/dumpyara
          BASE=$(basename "$ZIP" | cut -d"?" -f1); BASE=${BASE%.zip}
          WK="/tmp/dumpyara/working/$BASE"
          [ -n "${DUMPYARA_PAT:-}" ] && echo -n "$DUMPYARA_PAT" > "$WK/.github_token"
          [ -n "${TG_TOKEN:-}" ] && echo -n "$TG_TOKEN" > "$WK/.tgtoken"
          [ -n "${GIT_ORG:-}" ] && echo -n "$GIT_ORG" > "$WK/.github_orgname"
          [ -n "${CHAT_ID:-}" ] && echo -n "$CHAT_ID" > "$WK/.tg_chat"
          chmod 600 "$WK/.github_token" 2>/dev/null || true
          echo "[dumpyara-run] Running patched dumpyara on: $ZIP"
          /bin/bash ./dumpyara.sh "$ZIP" --working-dir /tmp/df || true
          echo "[dumpyara-run] Completed (exit may be non-zero; continuing to debug output)"
          EOF
          chmod +x /tmp/run_dumpyara_patched.sh
          /tmp/run_dumpyara_patched.sh

      - name: Rename output folder (safe, after debug)
        run: |
          cat <<'EOF' > /tmp/rename_output.sh
          #!/usr/bin/env bash
          set -euo pipefail
          ORIG_NAME=$(basename "$ROM_LINK" | cut -d"?" -f1)
          ORIG_DIR_NAME="${ORIG_NAME%.zip}"
          if [ -d /tmp/df/output ]; then
            mv /tmp/df/output /tmp/df/"$ORIG_DIR_NAME" || true
            echo "[rename] Renamed /tmp/df/output -> /tmp/df/$ORIG_DIR_NAME"
          else
            echo "[rename] No /tmp/df/output found; nothing to rename"
          fi
          EOF
          chmod +x /tmp/rename_output.sh
          /tmp/rename_output.sh

      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/df/*

      - name: Final cleanup (keep /tmp logs if you want)
        run: |
          cat <<'EOF' > /tmp/cleanup.sh
          #!/usr/bin/env bash
          set -euo pipefail
          # Comment out the next line if you want to keep /tmp/dumpyara and /tmp/df for debugging
          sudo rm -rf /tmp/dumpyara "${RUNNER_TEMP:-/tmp}/roms" /tmp/df ~/.cache || true
          EOF
          chmod +x /tmp/cleanup.sh
          /tmp/cleanup.sh

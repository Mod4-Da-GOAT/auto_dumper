name: CI

on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct Link of ROM/Firmware"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Setup dumpyara
        run: |
          cd /tmp
          git clone https://github.com/xxxbrian/dumpyara.git dumpyara
          cd dumpyara
          sudo bash setup.sh
          echo "$GITHUB_TOKEN" > .github_token
          echo "$GIT_ORG" > .github_orgname
          echo "$TG_TOKEN" > .tg_token
          echo "$CHAT_ID" > .tg_chat

      - name: Dump Firmware
        run: |
          cd /tmp/dumpyara
          ./dumpyara.sh "${ROM_LINK}" || exit 1

      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/dumpyara/output

      - name: Cleanup
        run: |
          sudo rm -rf /tmp/* ~/.cache || true

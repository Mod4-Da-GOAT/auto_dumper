name: Dump Firmware CI

on:
  workflow_dispatch:
    inputs:
      ROM_LINK:
        description: "Direct URL of ROM/Firmware"
        required: true

env:
  ROM_LINK: ${{ github.event.inputs.ROM_LINK }}
  GIT_ORG: "DroidDumps"
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  DUMPYARA_PAT: ${{ secrets.DUMPYARA_PAT }}

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Clone Dumpyara
        run: |
          cd /tmp
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          chmod +x dumpyara.sh
          if [ -f setup.sh ]; then sudo bash setup.sh; fi
          echo -n "$DUMPYARA_PAT" > /tmp/dumpyara/.github_token
          chmod 600 /tmp/dumpyara/.github_token
          echo "$GIT_ORG" > /tmp/dumpyara/.github_orgname
          echo "$TG_TOKEN" > /tmp/dumpyara/.tg_token
          echo "$CHAT_ID" > /tmp/dumpyara/.tg_chat

      - name: Install extraction & partition tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y p7zip-full lz4 android-sdk-libsparse-utils aria2 curl python3-pip
          pip3 install --no-cache-dir liblp

      # ------------------------------------------
      # FIXED 7Z WRAPPER (NO ZERO-SECOND EXECUTION)
      # ------------------------------------------
      - name: Create 7z wrapper script
        run: |
          cat << 'EOF' > /tmp/7z-wrapper.sh
#!/usr/bin/env bash
START=$(date +%s)   # prevent "0-second" execution bug

REAL7Z="/usr/bin/7z.real"

for arg in "$@"; do
  if [[ "$arg" =~ ^- ]]; then continue; fi
  candidate="$arg"
  dir=$(dirname "$candidate")

  # Unpack super.img.raw early
  if [[ "$candidate" != *"*"* ]] && [ -f "${dir}/super.img.raw" ] && [ ! -d "${dir}/super_unpacked" ]; then
    echo "[wrapper] Found super.img.raw — unpacking..."
    mkdir -p "${dir}/super_unpacked"
    if command -v lpunpack >/dev/null 2>&1; then
      lpunpack "${dir}/super.img.raw" "${dir}/super_unpacked" || echo "[wrapper] lpunpack failed"
      mv "${dir}/super_unpacked/"*.img "${dir}/" 2>/dev/null || true
    fi
  fi

  # Convert sparse → raw
  if [ -f "$candidate" ] && file -b "$candidate" | grep -qi "Android sparse image"; then
    echo "[wrapper] Converting sparse $candidate"
    tmp="${candidate}.raw"
    if command -v simg2img >/dev/null 2>&1; then
      simg2img "$candidate" "$tmp" && mv "$tmp" "$candidate"
    fi
  fi
done

# Small delay ensures GitHub Actions registers runtime
sleep 0.2

END=$(date +%s)
echo "[wrapper] Runtime: $((END - START)) sec"

exec "$REAL7Z" "$@"
EOF

          sudo mv /usr/bin/7z /usr/bin/7z.real || true
          sudo mv /tmp/7z-wrapper.sh /usr/local/bin/7z
          sudo chmod +x /usr/local/bin/7z
          echo "[setup] 7z wrapper installed."

      # ------------------------------------------------
      # NEW FAST DOWNLOAD SCRIPT (BEST SPEED + STABILITY)
      # ------------------------------------------------
      - name: Create fast download script
        run: |
          cat << 'EOF' > /tmp/fetch.sh
#!/usr/bin/env bash
set -e

URL="$1"
OUT="$2"

echo "[fetch] Starting fast download: $URL"
echo "[fetch] Output: $OUT"

# First: aria2c turbo mode
aria2c \
  -x16 -s16 -j1 \
  -m10 \
  -k1M \
  --console-log-level=warn \
  --file-allocation=none \
  -o "$OUT" "$URL" && exit 0

echo "[fetch] aria2c failed — switching to curl fallback"

# Second: robust curl with auto-resume + timeout
curl -L \
  --retry 10 \
  --retry-delay 5 \
  --retry-all-errors \
  --speed-time 15 \
  --speed-limit 10000 \
  -C - \
  -o "$OUT" "$URL"

echo "[fetch] Download complete."
EOF

          chmod +x /tmp/fetch.sh

      - name: Download ROM (Fast)
        run: |
          mkdir -p "$RUNNER_TEMP/roms"
          cd "$RUNNER_TEMP/roms"
          SHORT_FILE="firmware.zip"

          echo "Downloading ROM from: $ROM_LINK"
          /tmp/fetch.sh "$ROM_LINK" "$SHORT_FILE"

          if [ ! -s "$SHORT_FILE" ]; then
            echo "Download failed"; exit 1
          fi

          mkdir -p extracted
          mime=$(file -b --mime-type "$SHORT_FILE" || true)
          echo "MIME: $mime"

          if unzip -t "$SHORT_FILE" >/dev/null 2>&1; then
            unzip -q "$SHORT_FILE" -d extracted
          elif tar -tf "$SHORT_FILE" >/dev/null 2>&1; then
            tar -xf "$SHORT_FILE" -C extracted
          else
            cp "$SHORT_FILE" extracted/
          fi

          cd extracted

          # Handle LZ4 super.img
          if ls *super*.img.lz4 1>/dev/null 2>&1; then
            for s in *super*.img.lz4; do lz4 -d "$s" super.img.raw; done
          fi
          if ls *super*.img 1>/dev/null 2>&1; then
            for s in *super*.img; do
              if file "$s" | grep -qi lz4; then
                lz4 -d "$s" super.img.raw
              else
                cp "$s" super.img.raw
              fi
            done
          fi

          # Unpack super.img.raw
          if [ -f super.img.raw ]; then
            mkdir -p super_unpacked
            if command -v lpunpack >/dev/null 2>&1; then
              lpunpack super.img.raw super_unpacked || true
              mv super_unpacked/*.img . 2>/dev/null || true
            fi
          fi

          echo "Extracted files:"
          ls -lah

      - name: Run Dumpyara
        run: |
          mkdir -p /tmp/df
          cd /tmp/dumpyara
          ./dumpyara.sh "$RUNNER_TEMP/roms/firmware.zip" --working-dir /tmp/df || true

      - name: Rename output folder
        run: |
          cd /tmp/df
          ORIG_NAME=$(basename "$ROM_LINK" | cut -d'?' -f1)
          if [ -d output ]; then
            mv output "${ORIG_NAME%.zip}"
          fi

      - name: Upload Dump
        uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: /tmp/df/*

      - name: Cleanup
        run: |
          sudo rm -rf /tmp/dumpyara $RUNNER_TEMP/roms /tmp/df ~/.cache || true
